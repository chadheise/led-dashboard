# 4x HUB75 P5 panels, each physically 64 wide x 32 tall (landscape).
# Mounted in portrait (rotation 270) in a single horizontal row (chain_length=4, parallel=1).
# display.width  = chain_length x rows = 4 x 32 = 128
# display.height = parallel    x cols  = 1 x 64 = 64
display:
  width: 128
  height: 64
  fps: 30
  brightness: 80

server:
  host: "0.0.0.0"
  port: 8000

playlist:
  - app_id: text
    config:
      message: "LED Wall Display"
      scroll: true
      font_size: 16
      color: "#00FFAA"
    duration: 30

hardware:
  rows: 32            # physical panel height (landscape orientation)
  cols: 64            # physical panel width (landscape orientation)
  chain_length: 4     # panels per row
  parallel: 1         # rows of panels (parallel chains); >1 requires separate GPIO wiring
  rotation: 270       # per-panel rotation: 0=landscape, 90/270=portrait, 180=upside-down landscape
  alternate_rotation: true # odd panels rotate +180 deg (270->90->270->...) -- workaround for short cables
  pixel_mapper: ""    # extra library mapper, e.g. "U-mapper" for zigzag chain wiring
  gpio_slowdown: 4    # tuned for Pi 4
  hardware_mapping: adafruit-hat
