# 10x HUB75 P5 panels (64x32 each).
# Arranged in a 1x10 horizontal row -> 320 wide, 64 tall.
display:
  width: 320
  height: 64
  fps: 30
  brightness: 80

server:
  host: "0.0.0.0"
  port: 8000

playlist:
  - app_id: text
    config:
      message: "LED Wall Display"
      scroll: true
      font_size: 16
      color: "#00FFAA"
    duration: 30

hardware:
  rows: 64
  cols: 32      # width of a single panel; total = cols * chain_length
  chain_length: 10
  gpio_slowdown: 4 # tuned for Pi 4
  hardware_mapping: adafruit-hat
