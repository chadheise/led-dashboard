# 4x HUB75 P5 panels, each physically 64 wide x 32 tall (landscape).
# Mounted in portrait (rotated 90°) and arranged in a 1x4 horizontal row -> 128 wide, 64 tall.
display:
  width: 128
  height: 64
  fps: 30
  brightness: 80

server:
  host: "0.0.0.0"
  port: 8000

playlist:
  - app_id: text
    config:
      message: "LED Wall Display"
      scroll: true
      font_size: 16
      color: "#00FFAA"
    duration: 30

hardware:
  rows: 32 # physical height of each panel in landscape orientation
  cols: 64 # physical width of each panel in landscape orientation
  chain_length: 4
  rotation: 90  # panels are mounted portrait; rotate content to match
  gpio_slowdown: 4 # tuned for Pi 4
  hardware_mapping: adafruit-hat
