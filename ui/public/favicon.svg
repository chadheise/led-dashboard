<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 20" width="32" height="20">
  <!-- LED wall: 10 panels × 2 rows, styled in brand colors -->
  <rect width="32" height="20" rx="3" fill="#2C3E50"/>
  <!-- Row 1 -->
  <rect x="1"  y="2" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.9"/>
  <rect x="4"  y="2" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.9"/>
  <rect x="7"  y="2" width="2.2" height="2.2" rx="0.5" fill="#6aab72" opacity="0.9"/>
  <rect x="10" y="2" width="2.2" height="2.2" rx="0.5" fill="#6aab72" opacity="0.9"/>
  <rect x="13" y="2" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.9"/>
  <rect x="16" y="2" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.9"/>
  <rect x="19" y="2" width="2.2" height="2.2" rx="0.5" fill="#6aab72" opacity="0.9"/>
  <rect x="22" y="2" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.9"/>
  <rect x="25" y="2" width="2.2" height="2.2" rx="0.5" fill="#6aab72" opacity="0.9"/>
  <rect x="28" y="2" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.9"/>
  <!-- Row 2 -->
  <rect x="1"  y="5.5" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.7"/>
  <rect x="4"  y="5.5" width="2.2" height="2.2" rx="0.5" fill="#6aab72" opacity="0.7"/>
  <rect x="7"  y="5.5" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.7"/>
  <rect x="10" y="5.5" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.7"/>
  <rect x="13" y="5.5" width="2.2" height="2.2" rx="0.5" fill="#6aab72" opacity="0.7"/>
  <rect x="16" y="5.5" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.7"/>
  <rect x="19" y="5.5" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.7"/>
  <rect x="22" y="5.5" width="2.2" height="2.2" rx="0.5" fill="#6aab72" opacity="0.7"/>
  <rect x="25" y="5.5" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.7"/>
  <rect x="28" y="5.5" width="2.2" height="2.2" rx="0.5" fill="#C9CF9B" opacity="0.7"/>
  <!-- LED Wall text label -->
  <text x="16" y="16" text-anchor="middle" font-size="4" fill="#C9CF9B" font-family="monospace" opacity="0.85">LED WALL</text>
</svg>
